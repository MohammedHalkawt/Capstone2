<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; }
    body { background: #ffffff; color: #000; overflow: hidden; user-select: none; }
    
    #topbar {
      position: fixed; top: 0; left: 0; width: 100%; height: 90px;
      display: flex; align-items: center; padding: 0 30px; z-index: 100;
      background: #ffffff;
    }
    
    .backbtn {
      font-size: 32px; font-weight: 700; padding: 10px 40px;
      background: #fff; border: 4px solid #000; border-radius: 12px;
    }
    .backbtn:active { background: #000; color: #fff; }

    #main-content {
      position: absolute; top: 90px; bottom: 0; left: 0; right: 0;
      overflow-y: auto; padding: 40px 20px;
    }

    /* Scrollable pages */
    #main-content.page-home,
    #main-content.page-faq,
    #main-content.page-dir {
      overflow-y: auto;
    }

    /* Non-scrollable pages */
    #main-content.page-lang,
    #main-content.page-ans,
    #main-content.page-ai {
      overflow-y: hidden;
    }
    
    .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }
    
    .title-txt { font-size: 70px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .sub-txt { font-size: 36px; color: #555; margin-bottom: 60px; text-align: center; text-transform: uppercase; }
    
    .btn-wrap { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 30px; }
    .btn-huge {
      font-size: 45px; font-weight: 700; padding: 40px 20px;
      border: 4px solid #000; background: #fff; border-radius: 20px; text-align: center;
    }
    .btn-huge:active { background: #000; color: #fff; }
    
    .search-input {
      width: 100%; max-width: 700px; font-size: 36px; font-weight: 700;
      padding: 30px; border: 4px solid #000; border-radius: 15px; margin-bottom: 30px; outline: none;
    }
    
    .list-area { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; }
    .row-item {
      font-size: 32px; font-weight: 700; padding: 30px;
      border: 4px solid #000; border-radius: 15px; background: #fff;
    }
    .row-item:active { background: #000; color: #fff; }
    
    .ans-box {
      width: 100%; max-width: 700px; padding: 50px;
      border: 4px solid #000; border-radius: 20px; background: #fff; margin-top: 20px;
    }
    .q-txt { font-size: 45px; font-weight: 700; border-bottom: 4px solid #000; padding-bottom: 30px; margin-bottom: 30px; }
    .a-txt { font-size: 36px; font-weight: 600; color: #444; line-height: 1.4; }
    
    .kb-box {
      width: 100%; max-width: 1000px; background: #fff; border: 4px solid #000;
      border-radius: 20px; padding: 20px 4px; margin-bottom: 30px; display: none;
    }
    .kb-box.open { display: block; }
    .kb-row { display: flex; justify-content: stretch; gap: 3px; margin-bottom: 15px; }
    .kb-key {
      flex: 1; padding: 20px 0; font-size: 30px; font-weight: 700;
      text-align: center; border: 3px solid #000; border-radius: 12px; background: #fff; min-width: 0;
    }
    .kb-key:active { background: #000; color: #fff; }
    .k-wide { flex: 2; font-size: 28px; background: #eee; }
    .k-space { flex: 4; }

    .mic-circle {
      width: 300px; height: 300px; border-radius: 150px; border: 10px solid #000;
      margin: 80px auto; display: flex; justify-content: center; align-items: center;
      font-size: 60px; font-weight: 700; background: #fff;
    }
    .mic-circle.recording { background: #000; color: #fff; }

    .mic-circle.processing {
      animation: processingAnim 1.8s ease-in-out infinite;
      border-color: #aaa;
      color: #999;
    }
    @keyframes processingAnim {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.1); border-color: #999; }
      33% { transform: scale(1.03); box-shadow: 0 0 18px 6px rgba(0,0,0,0.07); border-color: #ccc; }
      66% { transform: scale(1.05); box-shadow: 0 0 30px 12px rgba(0,0,0,0.04); border-color: #ddd; }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.1); border-color: #999; }
    }

    .mic-circle.speaking { background: #000; color: #fff; }
  </style>
</head>
<body>

  <div id="topbar">
    <button class="backbtn" id="btnBack" onclick="goBack()">BACK</button>
  </div>

  <div id="main-content">

    <div id="p-home" class="screen active">
      <div class="title-txt" id="title-lock" style="margin-top:40px;">JARVIS</div>
      <div class="sub-txt">Kiosk Interface</div>
      <div class="btn-wrap">
        <div class="btn-huge" onclick="navTo('p-lang')">FAQ</div>
        <div class="btn-huge" onclick="openDir()">OFFICES</div>
        <div class="btn-huge" onclick="navTo('p-ai')">ASSISTANT</div>
      </div>
    </div>

    <div id="p-lang" class="screen">
      <div class="title-txt">LANGUAGE</div>
      <div class="btn-wrap" style="margin-top:40px;">
        <div class="btn-huge" onclick="openFaq('en')">ENGLISH</div>
        <div class="btn-huge" onclick="openFaq('ku')">کوردی</div>
        <div class="btn-huge" onclick="openFaq('ar')">العربية</div>
      </div>
    </div>

    <div id="p-faq" class="screen">
      <div class="title-txt" id="f-title">FAQ</div>
      <input type="text" id="f-search" class="search-input" placeholder="SEARCH..." readonly>
      <div id="f-kb" class="kb-box"></div>
      <div id="f-list" class="list-area"></div>
    </div>

    <div id="p-ans" class="screen">
      <div class="ans-box">
        <div id="ans-q" class="q-txt"></div>
        <div id="ans-a" class="a-txt"></div>
      </div>
    </div>

    <div id="p-dir" class="screen">
      <div class="title-txt">DIRECTORY</div>
      <input type="text" id="d-search" class="search-input" placeholder="SEARCH..." readonly>
      <div id="d-kb" class="kb-box"></div>
      <div id="d-list" class="list-area"></div>
    </div>

    <div id="p-ai" class="screen">
      <div class="title-txt">ASSISTANT</div>
      <div id="mic" class="mic-circle">MIC</div>
      <div class="sub-txt" id="ai-txt">READY</div>
    </div>

  </div>

<script>
  var faqs = [];
  var offices = [];
  var lang = 'en';
  var curInput = null;
  var curKb = null;
  var curPage = 'p-home';
  var lastPage = 'p-home';

  var fUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShnUz-r7psqJ1eTeBKjsT6uwD5pguKVH7QDx_blm0xQWBPwHCJX4zo8LB5LIOLNyPmLud4woHyUFZq/pub?output=csv";
  var dUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl2ae_I6i3rPM09ELaYVfsfZ6G54xvQmN3-xMrr-AvN2W18zuULSG217N4QjNX6uDlpJLGz6fHEJcj/pub?output=csv";

  function parseCSV(str) {
    var arr = [];
    var quote = false;
    var row = 0;
    var col = 0;
    for (var c = 0; c < str.length; c++) {
      var cc = str[c], nc = str[c+1];
      arr[row] = arr[row] || [];
      arr[row][col] = arr[row][col] || '';
      if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
      if (cc == '"') { quote = !quote; continue; }
      if (cc == ',' && !quote) { ++col; continue; }
      if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
      if (cc == '\n' && !quote) { ++row; col = 0; continue; }
      if (cc == '\r' && !quote) { ++row; col = 0; continue; }
      arr[row][col] += cc;
    }
    return arr;
  }

  /* Page → scroll class mapping */
  var scrollClass = {
    'p-home': 'page-home',
    'p-lang': 'page-lang',
    'p-faq':  'page-faq',
    'p-ans':  'page-ans',
    'p-dir':  'page-dir',
    'p-ai':   'page-ai'
  };

  window.onload = function() {
    document.getElementById('topbar').style.display = 'none';
    /* Set initial scroll class */
    updateScrollClass('p-home');

    fetch(fUrl).then(function(res) { return res.text(); }).then(function(txt) {
      var lines = parseCSV(txt);
      for(var i=1; i<lines.length; i++) {
        if(lines[i].length >= 6) {
          var entry = {
              en: {q: lines[i][0], a: lines[i][1]},
              ku: {q: lines[i][2], a: lines[i][3]},
              ar: {q: lines[i][4], a: lines[i][5]},
              _idx: faqs.length
          };
          faqs.push(entry);
        }
      }
    });

    fetch(dUrl).then(function(res) { return res.text(); }).then(function(txt) {
      var lines = parseCSV(txt);
      for(var i=1; i<lines.length; i++) {
        if(lines[i][0] && lines[i][1]) {
          offices.push({ n: lines[i][0], r: lines[i][1] });
        }
      }
    });
  };

  function updateScrollClass(pageId) {
    var mc = document.getElementById('main-content');
    /* Remove all page-* classes */
    mc.className = mc.className.replace(/\bpage-\S+/g, '').trim();
    if (scrollClass[pageId]) {
      mc.classList.add(scrollClass[pageId]);
    }
  }

  function navTo(id) {
    lastPage = curPage;
    curPage = id;
    var pages = document.getElementsByClassName('screen');
    for(var i=0; i<pages.length; i++) {
      pages[i].classList.remove('active');
    }
    document.getElementById(id).classList.add('active');
    
    if(id == 'p-home') {
      document.getElementById('topbar').style.display = 'none';
      document.getElementById('main-content').style.top = '0px';
    } else {
      document.getElementById('topbar').style.display = 'flex';
      document.getElementById('main-content').style.top = '90px';
    }
    
    if(id == 'p-home' || id == 'p-lang' || id == 'p-dir' || id == 'p-ai') {
      document.getElementById('btnBack').innerText = "BACK";
    }

    updateScrollClass(id);
    closeKb();
    document.getElementById('main-content').scrollTop = 0;
  }

  function goBack() {
    if(curPage == 'p-ans') { navTo('p-faq'); }
    else if(curPage == 'p-faq') { navTo('p-lang'); }
    else { navTo('p-home'); }
  }

  function openFaq(selLang) {
    lang = selLang;
    document.getElementById('f-search').value = '';
    
    if(lang == 'en') { 
      document.getElementById('f-title').innerText = "FAQ"; 
      document.getElementById('f-search').placeholder = "SEARCH...";
      document.getElementById('btnBack').innerText = "BACK";
    }
    if(lang == 'ku') { 
      document.getElementById('f-title').innerText = "پرسیارەکان"; 
      document.getElementById('f-search').placeholder = "گەڕان...";
      document.getElementById('btnBack').innerText = "گەڕانەوە";
    }
    if(lang == 'ar') { 
      document.getElementById('f-title').innerText = "الأسئلة"; 
      document.getElementById('f-search').placeholder = "بحث...";
      document.getElementById('btnBack').innerText = "رجوع";
    }

    var d = (lang == 'ar' || lang == 'ku') ? 'rtl' : 'ltr';
    document.getElementById('p-faq').setAttribute('dir', d);
    document.getElementById('p-ans').setAttribute('dir', d);

    setupKb(lang, 'f-kb', 'f-search');
    showFaqs(faqs);
    navTo('p-faq');
  }

  function openDir() {
    document.getElementById('d-search').value = '';
    setupKb('en', 'd-kb', 'd-search');
    showOffices(offices);
    navTo('p-dir');
  }

  function showFaqs(arr) {
    var h = '';
    for (var i = 0; i < arr.length; i++) {
        var t = arr[i][lang].q;
        if (t) {
            var idx = arr[i]._idx !== undefined ? arr[i]._idx : faqs.indexOf(arr[i]);
            h += '<div class="row-item" onclick="viewAns(' + idx + ')">' + t + '</div>';
        }
    }
    document.getElementById('f-list').innerHTML = h;
  }

  function viewAns(idx) {
    var item = faqs[idx][lang];
    document.getElementById('ans-q').innerText = item.q;
    document.getElementById('ans-a').innerText = item.a;
    navTo('p-ans');
  }

  function showOffices(arr) {
    var h = '';
    for(var i=0; i<arr.length; i++) {
      h += '<div class="row-item">' + arr[i].n + ' - ' + arr[i].r + '</div>';
    }
    document.getElementById('d-list').innerHTML = h;
  }

  var layouts = {
    en: [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Z','X','C','V','B','N','M'],
      ['DEL','SPACE','HIDE']
    ],
    ar: [
      ['ض','ص','ث','ق','ف','غ','ع','ه','خ','ح','ج','د'],
      ['ش','س','ي','ب','ل','ا','ت','ن','م','ك','ط'],
      ['ئ','ء','ؤ','ر','لا','ى','ة','و','ز','ظ'],
      ['مسح','SPACE','إخفاء']
    ],
    ku: [
      ['ق','و','ە','ر','ت','ی','ۆ','ئ','پ','ش'],
      ['ا','س','د','ف','گ','ه','ج','ک','ل','چ'],
      ['ز','خ','ح','ڤ','ب','ن','م','ڕ','ڵ','ژ'],
      ['سڕینەوە','SPACE','شاردنەوە']
    ]
  };

  function setupKb(l, boxId, inputId) {
    var keys = layouts[l];
    var h = '';
    for(var r=0; r<keys.length; r++) {
      h += '<div class="kb-row">';
      for(var k=0; k<keys[r].length; k++) {
        var c = keys[r][k];
        var cls = 'kb-key';
        var txt = c;
        if(c == 'DEL' || c == 'HIDE' || c == 'مسح' || c == 'إخفاء' || c == 'سڕینەوە' || c == 'شاردنەوە') { cls += ' k-wide'; }
        if(c == 'SPACE') { cls += ' k-space'; txt = ' '; }
        h += '<div class="'+cls+'" onclick="typeChar(\''+c+'\', \''+inputId+'\')">'+txt+'</div>';
      }
      h += '</div>';
    }
    document.getElementById(boxId).innerHTML = h;
  }

  function typeChar(c, inputId) {
    var el = document.getElementById(inputId);
    if(c == 'HIDE' || c == 'إخفاء' || c == 'شاردنەوە') { closeKb(); return; }
    if(c == 'DEL' || c == 'مسح' || c == 'سڕینەوە') { el.value = el.value.slice(0, -1); }
    else if(c == 'SPACE') { el.value += ' '; }
    else { el.value += c; }

    var word = el.value.toLowerCase();

    if (inputId == 'f-search') {
    var found = [];
    for (var i = 0; i < faqs.length; i++) {
        var qq = faqs[i][lang].q.toLowerCase();
        var aa = faqs[i][lang].a.toLowerCase();
        if (qq.indexOf(word) > -1 || aa.indexOf(word) > -1) {
            var item = faqs[i];
            item._idx = i;
            found.push(item);
        }
      }
      showFaqs(found);
    } else {
      var found = [];
      for(var i=0; i<offices.length; i++) {
        var nn = offices[i].n.toLowerCase();
        var rr = offices[i].r.toLowerCase();
        if(nn.indexOf(word) > -1 || rr.indexOf(word) > -1) {
          found.push(offices[i]);
        }
      }
      showOffices(found);
    }
  }

  function openKb(inputId, boxId) {
    closeKb();
    curInput = document.getElementById(inputId);
    curKb = document.getElementById(boxId);
    curKb.classList.add('open');
  }

  function closeKb() {
    if(curKb) { curKb.classList.remove('open'); }
    curInput = null;
  }

  document.getElementById('f-search').onclick = function() { openKb('f-search', 'f-kb'); };
  document.getElementById('d-search').onclick = function() { openKb('d-search', 'd-kb'); };

  var btnMic = document.getElementById('mic');
  var txtMic = document.getElementById('ai-txt');

  var mediaRecorderObj = null;
  var recordedAudioChunks = [];
  var isRecordingActive = false;
  var currentAudio = null;
  var silenceTimer = null;
  var audioContext = null;
  var SILENCE_THRESHOLD = 10;
  var SILENCE_DELAY = 2500;
  var MIN_RECORD_TIME = 2000;
  var recordingStartTime = null;

  var speakAnalyser = null;
  var speakAnimFrame = null;
  var speakAudioCtx = null;

  var waitToneCtx = null;
  var waitToneInterval = null;

  function startWaitTone() {
    try {
      waitToneCtx = new (window.AudioContext || window.webkitAudioContext)();
      var notes = [880, 1100];
      var idx = 0;
      function playNote() {
        if (!waitToneCtx || waitToneCtx.state === 'closed') return;
        var osc = waitToneCtx.createOscillator();
        var gain = waitToneCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(notes[idx], waitToneCtx.currentTime);
        gain.gain.setValueAtTime(0.025, waitToneCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, waitToneCtx.currentTime + 0.18);
        osc.connect(gain);
        gain.connect(waitToneCtx.destination);
        osc.start(waitToneCtx.currentTime);
        osc.stop(waitToneCtx.currentTime + 0.18);
        idx = (idx + 1) % notes.length;
      }
      playNote();
      waitToneInterval = setInterval(playNote, 600);
    } catch(e) {}
  }

  function stopWaitTone() {
    if (waitToneInterval) { clearInterval(waitToneInterval); waitToneInterval = null; }
    if (waitToneCtx) { waitToneCtx.close().catch(function(){}); waitToneCtx = null; }
  }

  function startSpeakAnimation(audioEl) {
    try {
      speakAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var source = speakAudioCtx.createMediaElementSource(audioEl);
      speakAnalyser = speakAudioCtx.createAnalyser();
      speakAnalyser.fftSize = 256;
      speakAnalyser.smoothingTimeConstant = 0.85;
      source.connect(speakAnalyser);
      speakAnalyser.connect(speakAudioCtx.destination);

      var data = new Uint8Array(speakAnalyser.frequencyBinCount);

      function animate() {
        if (!speakAnalyser) return;
        speakAnalyser.getByteFrequencyData(data);
        var sum = 0;
        for (var i = 0; i < data.length; i++) sum += data[i];
        var avg = sum / data.length;
        var norm = avg / 128;
        var scale = 1 + norm * 0.12;
        var glow = norm * 25;
        btnMic.style.transform = 'scale(' + scale + ')';
        btnMic.style.boxShadow = '0 0 ' + glow + 'px rgba(0,0,0,0.15)';
        speakAnimFrame = requestAnimationFrame(animate);
      }
      animate();
    } catch(e) {}
  }

  function stopSpeakAnimation() {
    if (speakAnimFrame) cancelAnimationFrame(speakAnimFrame);
    speakAnimFrame = null;
    btnMic.style.transform = '';
    btnMic.style.boxShadow = '';
    if (speakAudioCtx) { speakAudioCtx.close().catch(function(){}); speakAudioCtx = null; }
    speakAnalyser = null;
  }

  function stopCurrentAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.src = '';
      currentAudio = null;
    }
    btnMic.classList.remove('speaking');
    btnMic.classList.remove('processing');
    stopSpeakAnimation();
    stopWaitTone();
  }

  function beginRecording() {
    if (isRecordingActive) return;

    stopCurrentAudio();

    isRecordingActive = true;
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(function(stream) {
        mediaRecorderObj = new MediaRecorder(stream);
        recordedAudioChunks = [];
        mediaRecorderObj.ondataavailable = function(e) { recordedAudioChunks.push(e.data); };
        mediaRecorderObj.onstop = function() {
          clearTimeout(silenceTimer);
          silenceTimer = null;
          btnMic.style.transform = '';
          btnMic.style.boxShadow = '';
          if (audioContext) { audioContext.close(); audioContext = null; }

          txtMic.innerText = 'PROCESSING...';
          btnMic.classList.remove('recording');
          btnMic.classList.add('processing');
          startWaitTone();

          var audioBlob = new Blob(recordedAudioChunks);
          var formData = new FormData();
          formData.append('audio', audioBlob);

          fetch('/audio', { method: 'POST', body: formData })
            .then(function(res) {
              if (!res.ok) { btnMic.classList.remove('processing'); stopWaitTone(); txtMic.innerText = 'ERROR'; return; }
              return res.blob();
            })
            .then(function(blob) {
              if (!blob) { btnMic.classList.remove('processing'); stopWaitTone(); return; }
              var url = URL.createObjectURL(blob);
              currentAudio = new Audio(url);
              stopWaitTone();
              btnMic.classList.remove('processing');
              btnMic.classList.add('speaking');
              txtMic.innerText = 'SPEAKING...';
              startSpeakAnimation(currentAudio);
              currentAudio.play();
              currentAudio.onended = function() {
                btnMic.classList.remove('speaking');
                stopSpeakAnimation();
                txtMic.innerText = 'READY';
                URL.revokeObjectURL(url);
                currentAudio = null;
              };
            })
            .catch(function() { btnMic.classList.remove('processing'); stopWaitTone(); txtMic.innerText = 'ERROR'; });

          isRecordingActive = false;
          stream.getTracks().forEach(function(t) { t.stop(); });
        };

        audioContext = new AudioContext();
        var source = audioContext.createMediaStreamSource(stream);
        var analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
        var dataArray = new Uint8Array(analyser.frequencyBinCount);

        function checkSilence() {
          if (!isRecordingActive) return;
          analyser.getByteFrequencyData(dataArray);
          var avg = dataArray.reduce(function(a, b) { return a + b; }, 0) / dataArray.length;
          var elapsed = Date.now() - recordingStartTime;

          var norm = avg / 128;
          var scale = 1 + norm * 0.12;
          var glow = norm * 25;
          btnMic.style.transform = 'scale(' + scale + ')';
          btnMic.style.boxShadow = '0 0 ' + glow + 'px rgba(255,255,255,0.2)';

          if (avg < SILENCE_THRESHOLD && elapsed > MIN_RECORD_TIME) {
            if (!silenceTimer) {
              silenceTimer = setTimeout(function() {
                stopRecording();
              }, SILENCE_DELAY);
            }
          } else {
            clearTimeout(silenceTimer);
            silenceTimer = null;
          }
          requestAnimationFrame(checkSilence);
        }

        mediaRecorderObj.start();
        recordingStartTime = Date.now();
        btnMic.classList.add('recording');
        txtMic.innerText = 'LISTENING...';
        checkSilence();
      })
      .catch(function() {
        txtMic.innerText = 'MIC DENIED';
        isRecordingActive = false;
      });
  }

  function stopRecording() {
    if (mediaRecorderObj && mediaRecorderObj.state === 'recording') {
      mediaRecorderObj.stop();
    }
  }

  btnMic.addEventListener('mousedown', beginRecording);
  btnMic.addEventListener('mouseup', stopRecording);
  btnMic.addEventListener('mouseleave', stopRecording);
  btnMic.addEventListener('touchstart', function(e) { e.preventDefault(); beginRecording(); }, { passive: false });
  btnMic.addEventListener('touchend', function(e) { e.preventDefault(); stopRecording(); }, { passive: false });
  btnMic.addEventListener('touchcancel', function(e) { e.preventDefault(); stopRecording(); }, { passive: false });

  var tapCount = 0;
  document.getElementById('title-lock').onclick = function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      tapCount = 0;
    } else {
      tapCount++;
      if (tapCount >= 20) {
        document.exitFullscreen();
        tapCount = 0;
      }
    }
  };
</script>
</body>
</html>
