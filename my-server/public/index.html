<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>JARVIS · Kiosk with Fullscreen Lock</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --accent: #000000;
      --text: #000000;
      --dim: #444444;
      --border: #000000;
      font-size: 20px;
    }
    html, body {
      height: 100%; width: 100%;
      background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none;
    }

    .page { 
      position: fixed; inset: 0; z-index: 1; 
      display: none; flex-direction: column; align-items: center; 
      padding: 25px 16px; 
      overflow: hidden; 
    }
    .page.scrollable {
      overflow-y: auto;
      padding-top: 100px;
      padding-bottom: 40px;
    }
    .page.active { display: flex; animation: pageIn 0.25s ease both; }
    @keyframes pageIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    .back-btn {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100;
      display: flex; align-items: center; gap: 12px;
      background: #fff; border: 3px solid var(--border);
      border-radius: 10px;
      padding: 16px 24px;
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .back-btn:active { background: var(--accent); color: var(--bg); }
    .back-btn svg { width: 30px; height: 30px; stroke-width: 2.2; }

    .jarvis-title {
      font-size: 5.2rem; font-weight: 700;
      letter-spacing: 0.08em; color: var(--text);
      text-align: center; margin-top: 30px; margin-bottom: 10px;
      width: 100%;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .jarvis-title:active { transform: scale(0.98); }
    .jarvis-sub { 
      font-size: 1.5rem; letter-spacing: 0.25em; color: var(--dim); 
      text-transform: uppercase; text-align: center; margin-bottom: 40px; 
      width: 100%;
    }

    .menu-btn {
      width: 90%; max-width: 420px;
      display: flex; align-items: center; justify-content: center;
      gap: 20px;
      background: var(--bg); border: 3px solid var(--border);
      border-radius: 10px;
      padding: 20px 28px;
      cursor: pointer; margin: 0 auto 18px auto;
      transition: background 0.2s, color 0.2s;
    }
    .menu-btn:active { background: var(--accent); color: var(--bg); }
    .menu-btn:active svg { color: var(--bg); }
    .menu-btn svg { width: 44px; height: 44px; color: var(--text); flex-shrink: 0; }
    .menu-btn-text { font-size: 2.2rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }

    .section-title {
      font-size: 1.9rem; font-weight: 700;
      color: var(--dim); letter-spacing: 0.15em; text-align: center;
      margin-bottom: 30px; text-transform: uppercase; width: 100%;
    }
    
    .lang-btn {
      width: 90%; max-width: 460px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border: 3px solid var(--border);
      border-radius: 10px;
      padding: 30px 20px;
      cursor: pointer; margin: 0 auto 16px auto;
      font-size: 2.4rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em;
      transition: background 0.2s, color 0.2s;
    }
    .lang-btn:active { background: var(--accent); color: var(--bg); }
    .lang-btn span.sub { font-size: 1.5rem; color: var(--dim); margin-left: 15px; font-weight: 600; }

    .faq-btn {
      width: 90%; max-width: 500px;
      background: var(--bg);
      border: 3px solid var(--border);
      border-radius: 10px;
      padding: 28px 24px;
      cursor: pointer; margin: 0 auto 16px auto;
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.0rem; font-weight: 700;
      color: var(--text); text-align: center; line-height: 1.3;
      transition: background 0.2s, color 0.2s;
    }
    .faq-btn:active { background: var(--accent); color: var(--bg); }

    .faq-answer-box {
      width: 90%; max-width: 560px;
      background: var(--bg);
      border: 3px solid var(--border);
      border-radius: 12px;
      padding: 40px 30px;
      text-align: center;
      margin: 0 auto;
    }
    .faq-q {
      font-size: 2.4rem; font-weight: 700;
      color: var(--text); margin-bottom: 30px;
      line-height: 1.4; border-bottom: 2px solid var(--border);
      padding-bottom: 20px;
    }
    .faq-a {
      font-size: 1.9rem; font-weight: 600;
      color: var(--dim); line-height: 1.6;
    }

    .search-row {
      display: flex; gap: 10px;
      width: 90%; max-width: 560px;
      margin-bottom: 15px;
    }
    .search-wrap { flex: 1; position: relative; }
    .search-input {
      width: 100%; background: var(--bg); border: 3px solid var(--border);
      border-radius: 10px;
      padding: 22px 20px 22px 60px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem; font-weight: 600;
      color: var(--text); outline: none;
    }
    .search-input::placeholder { color: var(--dim); font-size: 1.4rem; }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text); }
    .search-icon svg { width: 32px; height: 32px; }
    .search-btn {
      background: var(--bg); border: 3px solid var(--border);
      border-radius: 10px;
      padding: 0 28px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      color: var(--text); cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .search-btn:active { background: var(--accent); color: var(--bg); }

    .simple-keyboard {
      width: 100%;
      margin: 5px 0 15px 0;
      border: 3px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      padding: 16px 8px;
      display: none;
    }
    .simple-keyboard.show { display: block; }
    .kb-row {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    .kb-key {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 16px 0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      flex: 1 1 0px;
      min-width: 40px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kb-key:active { background: var(--accent); color: var(--bg); }
    .kb-key.special { flex: 1.8; font-size: 1.6rem; }
    .kb-key.space { flex: 5; text-transform: uppercase; }
    .kb-key svg { width: 32px; height: 32px; stroke: currentColor; stroke-width: 2; fill: none; }

    .prof-row {
      width: 90%; max-width: 560px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg); border: 3px solid var(--border);
      border-radius: 10px;
      padding: 22px 28px;
      margin: 0 auto 14px auto;
    }
    .prof-name { font-size: 1.7rem; font-weight: 700; color: var(--text); }
    .prof-room { font-size: 1.6rem; font-weight: 700; color: var(--text); border: 2px solid var(--border); padding: 6px 14px; border-radius: 8px; }

    .jarvis-page-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; width: 100%;
    }
    .jarvis-mic-btn {
      position: relative;
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 4px solid var(--border);
      background: var(--bg);
      cursor: pointer; outline: none;
      transition: transform 0.15s, background 0.2s;
      margin-bottom: 40px;
    }
    .jarvis-mic-btn:active { background: var(--accent); }
    .jarvis-mic-btn:active svg { color: var(--bg); }
    .jarvis-mic-btn::after {
      content: ''; position: absolute; inset: -20px; border-radius: 50%;
      border: 2px solid var(--border); opacity: 0;
    }
    .jarvis-mic-btn.recording::after { opacity: 1; animation: pulse-ring 1.5s ease-in-out infinite; }
    .jarvis-mic-btn.recording { background: var(--accent); border-color: var(--accent); }
    .jarvis-mic-btn.recording svg { color: var(--bg); }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }
    .jarvis-mic-icon { 
      width: 90px; height: 90px; 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: var(--text); pointer-events: none; 
    }
    .jarvis-status-box {
      background: transparent; border: 3px solid var(--border);
      border-radius: 16px; padding: 24px 60px;
      text-align: center; min-width: 280px;
    }
    .jarvis-status { font-size: 2.0rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); }
    .waveform { display: flex; align-items: center; justify-content: center; gap: 6px; height: 42px; margin-top: 15px; opacity: 0; transition: opacity 0.3s; }
    .waveform.visible { opacity: 1; }
    .bar { width: 6px; background: var(--text); border-radius: 2px; height: 6px; }
    .waveform.visible .bar { animation: wave 0.8s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(1) { animation-delay: 0.0s; }
    .waveform.visible .bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform.visible .bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform.visible .bar:nth-child(4) { animation-delay: 0.3s; }
    .waveform.visible .bar:nth-child(5) { animation-delay: 0.4s; }
    .waveform.visible .bar:nth-child(6) { animation-delay: 0.5s; }
    .waveform.visible .bar:nth-child(7) { animation-delay: 0.6s; }
    .waveform.visible .bar:nth-child(8) { animation-delay: 0.7s; }
    @keyframes wave { from { height: 6px; } to { height: 36px; } }
    .lang-vertical { flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }

    .loader {
      text-align: center;
      font-size: 1.5rem;
      color: var(--dim);
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="jarvis-title" id="jarvisTitle">JARVIS</div>
  <div class="jarvis-sub">Kiosk Interface</div>

  <button class="menu-btn" onclick="goToPage('page-faq-lang')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.5 9.5a3 3 0 1 1 3 3v1.5"/>
      <circle cx="12" cy="17.5" r="0.5" fill="currentColor"/>
    </svg>
    <span class="menu-btn-text">FAQ</span>
  </button>

  <button class="menu-btn" onclick="goToPage('page-offices')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <span class="menu-btn-text">Offices</span>
  </button>

  <button class="menu-btn" onclick="goToPage('page-jarvis')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    <span class="menu-btn-text">Assistant</span>
  </button>
</div>

<!-- FAQ LANGUAGE SELECT -->
<div class="page" id="page-faq-lang">
  <button class="back-btn" onclick="goToPage('page-home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="lang-vertical">
    <div class="section-title">SELECT LANGUAGE</div>
    <button class="lang-btn" onclick="setLanguage('en'); goToPage('page-faq-list')">English</button>
    <button class="lang-btn" onclick="setLanguage('ku'); goToPage('page-faq-list')">کوردی <span class="sub">Kurdish</span></button>
    <button class="lang-btn" onclick="setLanguage('ar'); goToPage('page-faq-list')">العربية <span class="sub">Arabic</span></button>
  </div>
</div>

<!-- FAQ LIST -->
<div class="page scrollable" id="page-faq-list">
  <button class="back-btn" onclick="goToPage('page-faq-lang')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="section-title" id="faqListTitle">FAQ</div>
  <div id="faqQuestionsContainer" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
</div>

<!-- FAQ ANSWER -->
<div class="page scrollable" id="page-faq-answer">
  <button class="back-btn" onclick="goToPage('page-faq-list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%;">
    <div class="faq-answer-box" id="faqAnswerBox">
      <div class="faq-q" id="faqAnswerQuestion"></div>
      <div class="faq-a" id="faqAnswerText"></div>
    </div>
  </div>
</div>

<!-- OFFICES (Google Sheets powered) -->
<div class="page scrollable" id="page-offices">
  <button class="back-btn" onclick="goToPage('page-home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="section-title">OFFICES</div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search..." autocomplete="off" readonly>
    </div>
    <button class="search-btn" id="searchButton">Search</button>
  </div>
  <div class="simple-keyboard" id="keyboardContainer"></div>
  <div id="officeListContainer" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="loader">Loading offices...</div>
  </div>
</div>

<!-- JARVIS AI (original server-based voice) -->
<div class="page" id="page-jarvis">
  <button class="back-btn" onclick="goToPage('page-home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="jarvis-page-wrap">
    <div class="jarvis-title" style="font-size:4rem; margin-top:0;">AI</div>
    <button class="jarvis-mic-btn" id="micButton">
      <svg class="jarvis-mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <div class="jarvis-status-box">
      <div class="jarvis-status" id="jarvisStatusText">Ready</div>
      <div class="waveform" id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const FULLSCREEN_EXIT_TAPS = 25;
  const OFFICES_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl2ae_I6i3rPM09ELaYVfsfZ6G54xvQmN3-xMrr-AvN2W18zuULSG217N4QjNX6uDlpJLGz6fHEJcj/pub?output=csv";
  const FAQ_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShnUz-r7psqJ1eTeBKjsT6uwD5pguKVH7QDx_blm0xQWBPwHCJX4zo8LB5LIOLNyPmLud4woHyUFZq/pub?output=csv";

  let officeList = [];
  let faqCollection = { en: [], ku: [], ar: [] };
  let currentLanguage = 'en';

  let fullscreenTapCount = 0;
  const jarvisTitleElement = document.getElementById('jarvisTitle');

  function goFullscreen() {
    const docElement = document.documentElement;
    if (docElement.requestFullscreen) {
      docElement.requestFullscreen().catch(function(err) { console.warn("Fullscreen error:", err); });
    }
  }

  function exitFullscreen() {
    if (document.exitFullscreen) {
      document.exitFullscreen().catch(function(err) { console.warn("Exit error:", err); });
    }
  }

  jarvisTitleElement.addEventListener('click', function(e) {
    e.stopPropagation();
    const isCurrentlyFullscreen = !!document.fullscreenElement;
    if (!isCurrentlyFullscreen) {
      goFullscreen();
      fullscreenTapCount = 0;
    } else {
      fullscreenTapCount++;
      jarvisTitleElement.style.transform = "scale(0.98)";
      setTimeout(function() { jarvisTitleElement.style.transform = ""; }, 100);
      if (fullscreenTapCount >= FULLSCREEN_EXIT_TAPS) {
        exitFullscreen();
        fullscreenTapCount = 0;
        alert("Fullscreen unlocked (" + FULLSCREEN_EXIT_TAPS + " taps).");
      }
    }
  });

  function fetchOfficeData() {
    const container = document.getElementById('officeListContainer');
    container.innerHTML = '<div class="loader">Loading offices...</div>';
    fetch(OFFICES_SHEET_URL)
      .then(function(response) { return response.text(); })
      .then(function(csvText) {
        if (csvText.charCodeAt(0) === 0xFEFF) csvText = csvText.slice(1);
        const lines = csvText.split(/\r?\n/).filter(function(line) { return line.trim().length > 0; });
        if (lines.length < 2) throw new Error("No data rows");
        const headers = lines[0].split(',').map(function(h) { return h.trim().replace(/^"|"$/g, '').toLowerCase(); });
        const nameIndex = headers.indexOf('name');
        const roomIndex = headers.indexOf('room');
        if (nameIndex === -1 || roomIndex === -1) throw new Error("Missing 'name' or 'room' columns");
        const newData = [];
        for (var i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, ''); });
          if (cols.length <= nameIndex || cols.length <= roomIndex) continue;
          let name = cols[nameIndex];
          let room = cols[roomIndex];
          if (name && room) newData.push({ name: name, room: room });
        }
        if (newData.length === 0) throw new Error("No valid entries");
        officeList = newData;
        showOfficesOnScreen(officeList);
      })
      .catch(function(err) {
        console.error("Offices load error:", err);
        container.innerHTML = '<div class="loader" style="color:red;">Failed to load offices. Check console.</div>';
      });
  }

  function showOfficesOnScreen(list) {
    const container = document.getElementById('officeListContainer');
    container.innerHTML = '';
    for (var i = 0; i < list.length; i++) {
      const row = document.createElement('div');
      row.className = 'prof-row';
      row.innerHTML = '<span class="prof-name">' + cleanText(list[i].name) + '</span><span class="prof-room">' + cleanText(list[i].room) + '</span>';
      container.appendChild(row);
    }
    if (list.length === 0) {
      container.innerHTML = '<div class="loader">No matching offices found.</div>';
    }
  }

  function filterOfficeList() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = officeList.filter(function(office) { return office.name.toLowerCase().includes(query); });
    showOfficesOnScreen(filtered);
  }

  function fetchFaqData() {
    fetch(FAQ_SHEET_URL)
      .then(function(response) { return response.text(); })
      .then(function(csvText) {
        if (csvText.charCodeAt(0) === 0xFEFF) csvText = csvText.slice(1);
        const lines = csvText.split(/\r?\n/).filter(function(line) { return line.trim().length > 0; });
        if (lines.length < 2) throw new Error("No data rows");
        const headers = lines[0].split(',').map(function(h) { return h.trim().replace(/^"|"$/g, ''); });
        const engQIdx = headers.findIndex(function(h) { return h.toLowerCase() === 'engquestion'; });
        const engAIdx = headers.findIndex(function(h) { return h.toLowerCase() === 'enganswer'; });
        const kuQIdx = headers.findIndex(function(h) { return h.toLowerCase() === 'kuquestion'; });
        const kuAIdx = headers.findIndex(function(h) { return h.toLowerCase() === 'kuanswer'; });
        const arQIdx = headers.findIndex(function(h) { return h.toLowerCase() === 'arquestion'; });
        const arAIdx = headers.findIndex(function(h) { return h.toLowerCase() === 'aranswer'; });
        if (engQIdx === -1 || engAIdx === -1 || kuQIdx === -1 || kuAIdx === -1 || arQIdx === -1 || arAIdx === -1) {
          throw new Error("Missing required FAQ columns");
        }
        const newFaq = { en: [], ku: [], ar: [] };
        for (var i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, ''); });
          if (cols.length <= Math.max(engQIdx, engAIdx, kuQIdx, kuAIdx, arQIdx, arAIdx)) continue;
          const engQ = cols[engQIdx];
          const engA = cols[engAIdx];
          const kuQ = cols[kuQIdx];
          const kuA = cols[kuAIdx];
          const arQ = cols[arQIdx];
          const arA = cols[arAIdx];
          if (engQ && engA) newFaq.en.push({ q: engQ, a: engA });
          if (kuQ && kuA) newFaq.ku.push({ q: kuQ, a: kuA });
          if (arQ && arA) newFaq.ar.push({ q: arQ, a: arA });
        }
        if (newFaq.en.length === 0) throw new Error("No English FAQ entries");
        faqCollection = newFaq;
      })
      .catch(function(err) {
        console.error("FAQ load error:", err);
        const container = document.getElementById('faqQuestionsContainer');
        container.innerHTML = '<div class="loader" style="color:red;">Failed to load FAQs. Check console.</div>';
      });
  }

  function setLanguage(lang) {
    currentLanguage = lang;
    const titles = { en: 'FAQ', ku: 'پرسیارە باوەکان', ar: 'الأسئلة الشائعة' };
    document.getElementById('faqListTitle').textContent = titles[lang];
    const dir = (lang === 'ar' || lang === 'ku') ? 'rtl' : 'ltr';
    const container = document.getElementById('faqQuestionsContainer');
    container.innerHTML = '';
    const faqsForLang = faqCollection[lang];
    if (!faqsForLang || faqsForLang.length === 0) {
      container.innerHTML = '<div class="loader">No FAQs available in this language.</div>';
      return;
    }
    for (var i = 0; i < faqsForLang.length; i++) {
      const btn = document.createElement('button');
      btn.className = 'faq-btn';
      btn.setAttribute('dir', dir);
      btn.textContent = faqsForLang[i].q;
      btn.onclick = (function(item) {
        return function() {
          const d = (currentLanguage === 'ar' || currentLanguage === 'ku') ? 'rtl' : 'ltr';
          document.getElementById('faqAnswerBox').setAttribute('dir', d);
          document.getElementById('faqAnswerQuestion').textContent = item.q;
          document.getElementById('faqAnswerText').textContent = item.a;
          goToPage('page-faq-answer');
        };
      })(faqsForLang[i]);
      container.appendChild(btn);
    }
  }

  function goToPage(pageId) {
    const allPages = document.querySelectorAll('.page');
    for (var i = 0; i < allPages.length; i++) {
      allPages[i].classList.remove('active');
    }
    document.getElementById(pageId).classList.add('active');
    if (pageId !== 'page-offices') hideCustomKeyboard();
  }

  let keyboardVisible = false;
  const keyboardDiv = document.getElementById('keyboardContainer');
  const officeSearchInput = document.getElementById('searchInput');
  const officeSearchButton = document.getElementById('searchButton');

  const backspaceIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>';
  const searchIconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';

  const keyboardRows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['Z','X','C','V','B','N','M'],
    ['BACKSPACE','SPACE','SEARCH']
  ];

  function buildCustomKeyboard() {
    let html = '';
    for (var r = 0; r < keyboardRows.length; r++) {
      html += '<div class="kb-row">';
      for (var k = 0; k < keyboardRows[r].length; k++) {
        let key = keyboardRows[r][k];
        let cls = 'kb-key';
        let content = key;
        if (key === 'BACKSPACE') { cls += ' special'; content = backspaceIcon; }
        else if (key === 'SEARCH') { cls += ' special'; content = searchIconSvg; }
        else if (key === 'SPACE') { cls += ' space'; content = '␣'; }
        html += '<div class="' + cls + '" data-key="' + key + '">' + content + '</div>';
      }
      html += '</div>';
    }
    keyboardDiv.innerHTML = html;

    const allKeys = document.querySelectorAll('.kb-key');
    for (var i = 0; i < allKeys.length; i++) {
      allKeys[i].addEventListener('mousedown', function(e) { e.preventDefault(); });
      allKeys[i].addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const key = this.dataset.key;
        if (!key) return;
        if (key === 'BACKSPACE') {
          officeSearchInput.value = officeSearchInput.value.slice(0, -1);
          filterOfficeList();
        } else if (key === 'SPACE') {
          officeSearchInput.value += ' ';
          filterOfficeList();
        } else if (key === 'SEARCH') {
          filterOfficeList();
          keyboardVisible = false;
          hideCustomKeyboard();
        } else {
          officeSearchInput.value += key;
          filterOfficeList();
        }
      });
    }
  }

  function showCustomKeyboard() {
    keyboardVisible = true;
    keyboardDiv.classList.add('show');
  }

  function hideCustomKeyboard() {
    keyboardVisible = false;
    keyboardDiv.classList.remove('show');
  }

  officeSearchInput.addEventListener('click', function() { showCustomKeyboard(); });
  officeSearchInput.addEventListener('touchstart', function(e) { e.preventDefault(); showCustomKeyboard(); }, { passive: false });
  officeSearchButton.addEventListener('mousedown', function(e) { e.preventDefault(); });
  officeSearchButton.addEventListener('click', function() { filterOfficeList(); hideCustomKeyboard(); });
  document.addEventListener('click', function(e) {
    if (!officeSearchInput.contains(e.target) &&
        !keyboardDiv.contains(e.target) &&
        !officeSearchButton.contains(e.target)) {
      hideCustomKeyboard();
    }
  });

  let mediaRecorderObj = null;
  let recordedAudioChunks = [];
  let isRecordingActive = false;
  const micButton = document.getElementById('micButton');
  const jarvisStatusSpan = document.getElementById('jarvisStatusText');
  const waveformDiv = document.getElementById('waveform');

  function setJarvisMessage(text) { jarvisStatusSpan.textContent = text; }

  function beginRecording() {
    if (isRecordingActive) return;
    isRecordingActive = true;
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(function(stream) {
        mediaRecorderObj = new MediaRecorder(stream);
        recordedAudioChunks = [];
        mediaRecorderObj.ondataavailable = function(e) { recordedAudioChunks.push(e.data); };
        mediaRecorderObj.onstop = function() {
          setJarvisMessage('Processing...');
          waveformDiv.classList.remove('visible');
          micButton.classList.remove('recording');
          const audioBlob = new Blob(recordedAudioChunks);
          const formData = new FormData();
          formData.append('audio', audioBlob);
          fetch('/audio', { method: 'POST', body: formData })
            .catch(function() { setJarvisMessage('Error'); });
          setJarvisMessage('Ready');
          isRecordingActive = false;
          stream.getTracks().forEach(function(t) { t.stop(); });
        };
        mediaRecorderObj.start();
        micButton.classList.add('recording');
        waveformDiv.classList.add('visible');
        setJarvisMessage('Listening...');
      })
      .catch(function() { setJarvisMessage('Mic Denied'); isRecordingActive = false; });
  }

  function stopRecording() {
    if (mediaRecorderObj && mediaRecorderObj.state === 'recording') {
      mediaRecorderObj.stop();
    }
  }

  micButton.addEventListener('mousedown', beginRecording);
  micButton.addEventListener('mouseup', stopRecording);
  micButton.addEventListener('mouseleave', stopRecording);
  micButton.addEventListener('touchstart', function(e) { e.preventDefault(); beginRecording(); }, { passive: false });
  micButton.addEventListener('touchend', function(e) { e.preventDefault(); stopRecording(); }, { passive: false });
  micButton.addEventListener('touchcancel', function(e) { e.preventDefault(); stopRecording(); }, { passive: false });

  function cleanText(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  window.addEventListener('load', function() {
    fetchOfficeData();
    fetchFaqData();
    setLanguage('en');
    buildCustomKeyboard();
    hideCustomKeyboard();
  });
</script>
</body>
</html>
