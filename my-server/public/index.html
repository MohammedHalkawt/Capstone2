<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>JARVIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060b12;
      --surface: #0d1825;
      --accent: #00d4ff;
      --accent2: #0066ff;
      --glow: rgba(0, 212, 255, 0.35);
      --text: #c8e8f0;
      --dim: #4a7a8a;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif; overflow: hidden;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .container {
      position: relative; z-index: 1; height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-between; padding: 48px 24px 60px;
    }
    .header { text-align: center; animation: fadeDown 0.8s ease both; }
    .header h1 {
      font-family: 'Orbitron', monospace; font-size: 2.8rem; font-weight: 900;
      letter-spacing: 0.3em; color: var(--accent);
      text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(0,212,255,0.2);
    }
    .header p { font-size: 0.85rem; letter-spacing: 0.25em; color: var(--dim); margin-top: 6px; text-transform: uppercase; }
    .status-panel {
      width: 100%; max-width: 360px; background: var(--surface);
      border: 1px solid rgba(0,212,255,0.15); border-radius: 12px;
      padding: 16px 20px; animation: fadeUp 0.8s 0.2s ease both;
    }
    .status-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
    .status-text { font-size: 1rem; font-weight: 600; color: var(--text); min-height: 24px; transition: color 0.3s; }
    .status-text.active { color: var(--accent); }
    .status-text.processing { color: #ffaa00; }
    .waveform { display: flex; align-items: center; justify-content: center; gap: 4px; height: 48px; margin-top: 12px; opacity: 0; transition: opacity 0.3s; }
    .waveform.visible { opacity: 1; }
    .bar { width: 4px; background: var(--accent); border-radius: 2px; height: 6px; }
    .waveform.visible .bar:nth-child(1) { animation: wave 0.8s 0.0s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(2) { animation: wave 0.8s 0.1s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(3) { animation: wave 0.8s 0.2s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(4) { animation: wave 0.8s 0.05s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(5) { animation: wave 0.8s 0.15s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(6) { animation: wave 0.8s 0.25s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(7) { animation: wave 0.8s 0.08s ease-in-out infinite alternate; }
    .waveform.visible .bar:nth-child(8) { animation: wave 0.8s 0.18s ease-in-out infinite alternate; }
    @keyframes wave { from { height: 6px; } to { height: 36px; } }
    .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fadeUp 0.8s 0.4s ease both; }
    .mic-btn {
      position: relative; width: 160px; height: 160px; border-radius: 50%;
      border: none; background: var(--surface); cursor: pointer; outline: none;
      -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
    }
    .mic-btn::before {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      z-index: -1; transition: opacity 0.3s; opacity: 0.6;
    }
    .mic-btn::after {
      content: ''; position: absolute; inset: -16px; border-radius: 50%;
      border: 2px solid var(--accent); opacity: 0; transition: opacity 0.3s;
    }
    .mic-btn.recording::after { opacity: 0.4; animation: pulse-ring 1s ease-in-out infinite; }
    .mic-btn.recording::before { opacity: 1; }
    .mic-btn.recording { transform: scale(1.06); background: #0a1e30; }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.3); opacity: 0; } }
    .mic-icon { font-size: 3.2rem; pointer-events: none; transition: transform 0.15s; display: block; line-height: 160px; text-align: center; }
    .mic-btn.recording .mic-icon { transform: scale(1.1); }
    .btn-hint { font-size: 0.8rem; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; text-align: center; }
    .result-panel { width: 100%; max-width: 360px; animation: fadeUp 0.8s 0.6s ease both; }
    .result-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
    .result-text { font-size: 1.1rem; font-weight: 600; color: var(--accent); min-height: 28px; text-shadow: 0 0 20px rgba(0,212,255,0.4); }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>JARVIS</h1>
      <p>Voice Interface System</p>
    </div>
    <div class="status-panel">
      <div class="status-label">System Status</div>
      <div class="status-text" id="statusText">Ready</div>
      <div class="waveform" id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>
    <div class="btn-wrap">
      <button class="mic-btn" id="micBtn">
        <span class="mic-icon">🎙️</span>
      </button>
      <div class="btn-hint">Hold to speak</div>
    </div>
    <div class="result-panel">
      <div class="result-label">Last Command</div>
      <div class="result-text" id="resultText">—</div>
    </div>
  </div>
  <script>
    let mediaRecorder, audioChunks = [], isRecording = false;
    const btn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const resultText = document.getElementById('resultText');
    const waveform = document.getElementById('waveform');

    function setStatus(text, cls) {
      statusText.textContent = text;
      statusText.className = 'status-text ' + (cls || '');
    }

    async function startRecording() {
      if (isRecording) return;
      isRecording = true;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          setStatus('Processing...', 'processing');
          waveform.classList.remove('visible');
          const blob = new Blob(audioChunks);
          const formData = new FormData();
          formData.append('audio', blob);
          try {
            const res = await fetch('/audio', { method: 'POST', body: formData });
            const text = await res.text();
            if (text && text !== 'No speech detected') {
              resultText.textContent = text.replace('FINAL:', '').trim();
            }
          } catch(e) { setStatus('Error', ''); }
          setStatus('Ready', '');
          isRecording = false;
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        btn.classList.add('recording');
        waveform.classList.add('visible');
        setStatus('Listening...', 'active');
      } catch(e) {
        setStatus('Mic access denied', '');
        isRecording = false;
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        btn.classList.remove('recording');
      }
    }

    btn.addEventListener('mousedown', startRecording);
    btn.addEventListener('mouseup', stopRecording);
    btn.addEventListener('mouseleave', stopRecording);
    btn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); }, { passive: false });
    btn.addEventListener('touchcancel', e => { e.preventDefault(); stopRecording(); }, { passive: false });
  </script>
</body>
</html>
